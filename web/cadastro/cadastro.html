<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Universal Store | Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>
    <header>
        <div class="logo">🚀 Universal Store</div>
        <nav>
            <a href="../index.html">Voltar para Home</a>
        </nav>
    </header>

    <div class="container">
        <div class="form-box">
            <h2>Cadastrar Novo Item</h2>
            <form id="form-cadastro">
                <div class="input-group">
                    <label>Nome do Produto/Filme</label>
                    <input type="text" id="nome" placeholder="Ex: Inception" required>
                </div>
                <div class="input-group">
                    <label>Categoria</label>
                    <input type="text" id="categoria" placeholder="Ex: Ficção Científica" required>
                </div>
                <div class="input-group">
                    <label>Preço (R$)</label>
                    <input type="number" id="preco" step="0.01" placeholder="0.00" required>
                </div>
                <button type="submit">Finalizar Cadastro</button>
            </form>
            <a href="../produtos/produtos.html" class="back-link">← Ir para a Vitrine</a>
        </div>
    </div>

    <script>
        if (localStorage.getItem('theme') === 'dark-mode') {
            document.body.classList.add('dark-mode');
        }
    </script>
    <script src="cadastro.js"></script>
</body>
</html>
