<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Store | Cadastro Premium</title>
    <link rel="stylesheet" href="cadastro.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body class="cadastro-page">
    <div class="blob"></div>
    <div class="blob2"></div>

    <header>
        <div class="header-left"></div> 
        <div class="logo">🚀 Raphael Store</div>
        
        <nav>
            <a href="../index.html" class="btn-theme nav-link">Home</a>
            <button id="theme-toggle" class="btn-theme">🌓 Tema</button>
        </nav>
    </header>

    <div class="container">
        <h1 class="main-title">Sistema de <span>Cadastro</span></h1>

        <div class="form-box">
            <div class="card-header">
                <h2>Novo Registro</h2>
                <p>Alimente sua vitrine com novos itens</p>
            </div>

            <form id="form-cadastro">
                <div class="input-box">
                    <label>Nome do Produto/Filme</label>
                    <input type="text" id="nome" placeholder="Ex: Inception" required>
                    <i class="line"></i>
                </div>
                <div class="input-box">
                    <label>Categoria</label>
                    <input type="text" id="categoria" placeholder="Ex: Ficção Científica" required>
                    <i class="line"></i>
                </div>
                <div class="input-box">
                    <label>Preço (R$)</label>
                    <input type="number" id="preco" step="0.01" placeholder="0.00" required>
                    <i class="line"></i>
                </div>
                <button type="submit" class="shiny-btn">Finalizar Cadastro</button>
            </form>
            <a href="../produtos/produtos.html" class="back-link">← Ir para a Vitrine</a>
        </div>
    </div>

    <script>
        // Mantém a preferência de tema do usuário
        if (localStorage.getItem('theme') === 'dark-mode') {
            document.body.classList.add('dark-mode');
        }
    </script>
    <script src="cadastro.js"></script>
</body>
</html>
